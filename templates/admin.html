<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-5">

                <div class="card main-card">
                    <div class="header-section">
                        <h2>Admin Login</h2>
                        <p>Only Authorized User Can Access Dashboard</p>
                    </div>

                    <div class="card-body p-4">

                        {% if error %}
                        <div class="alert alert-danger text-center">{{ error }}</div>
                        {% endif %}

                        <form method="POST">

                            <div class="mb-3">
                                <label class="form-label">Username</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>

                                <div class="input-group">
                                    <input type="password" id="adminPassword" name="password" class="form-control"
                                        placeholder="Enter Password" required>
                                    <button type="button" class="btn btn-outline-secondary" onclick="togglePassword()">
                                        <span id="eyeIcon">Show</span>
                                    </button>
                                </div>

                                <small id="passMsg" class="text-danger" style="display:none;">
                                    Please enter password first
                                </small>
                            </div>
                            <div class="d-grid">
                                <button type="submit" class="btn btn-custom text-white">Login</button>
                            </div>

                            <div class="text-center mt-3">
                                <a href="/" class="btn btn-outline-primary btn-sm">⬅ Back to Home</a>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='admin.js') }}"></script>

</body>

</html>
