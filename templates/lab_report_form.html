<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab Report Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
    <h2 class="fw-bold text-primary text-center">Lab Report Entry</h2>

    <div class="card shadow p-4 mt-4">
        <h5 class="text-success">Patient: {{ patient[1] }} | Age: {{ patient[2] }} | Gender: {{ patient[3] }}</h5>
        <hr>

        <form method="POST">
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Glucose (mg/dL)</label>
                    <input type="number" step="0.1" name="glucose" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">HbA1c (%)</label>
                    <input type="number" step="0.1" name="hba1c" class="form-control" required>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Blood Pressure</label>
                    <input type="text" name="blood_pressure" class="form-control" placeholder="120/80" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Cholesterol (mg/dL)</label>
                    <input type="number" step="0.1" name="cholesterol" class="form-control" required>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Hemoglobin (g/dL)</label>
                    <input type="number" step="0.1" name="hemoglobin" class="form-control" required>
                </div>
            </div>

            <div class="text-center mt-3">
                <button class="btn btn-success btn-lg">Generate Report</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
