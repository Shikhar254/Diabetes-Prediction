<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Information</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">

                <div class="card main-card">

                    <!-- Header -->
                    <div class="header-section">
                        <h2>Patient Information</h2>
                        <p>Enter Basic Details Before Diabetes Prediction</p>
                    </div>

                    <!-- Body -->
                    <div class="card-body p-4">

                        <h5 class="mb-3 text-primary fw-bold">Basic Patient Details</h5>

                        <form action="/form" method="POST" onsubmit="return validateSymptoms()">

                            <!-- Name -->
                            <div class="mb-3">
                                <label class="form-label">Patient Name</label>
                                <input type="text" name="name" class="form-control"
                                    placeholder="Enter Patient Full Name" required>
                            </div>

                            <div class="row g-3">

                                <!-- Age -->
                                <div class="col-md-6">
                                    <label class="form-label">Age</label>
                                    <input type="number" name="age" class="form-control" placeholder="Enter Age"
                                        required>
                                </div>

                                <!-- Gender -->
                                <div class="col-md-6">
                                    <label class="form-label">Gender</label>
                                    <select name="gender" class="form-select" required>
                                        <option value="">Select Gender</option>
                                        <option value="Male">Male</option>
                                        <option value="Female">Female</option>
                                    </select>
                                </div>

                            </div>

                            <!-- Symptoms -->
                            <div class="mt-4">
                                <label class="form-label fw-bold">Symptoms (Required)</label>
                                <p class="text-muted" style="font-size: 13px;">
                                    Select at least one symptom OR choose "None".
                                </p>

                                <!-- Error message -->
                                <div id="symptomError" class="alert alert-danger py-2" style="display:none;">
                                    Please select at least one symptom or choose None.
                                </div>

                                <!-- NONE OPTION -->
                                <div class="form-check mb-2">
                                    <input class="form-check-input" type="checkbox" id="noneSymptom" name="symptoms"
                                        value="None" onclick="toggleNoneSymptom()">
                                    <label class="form-check-label fw-bold text-success">None</label>
                                </div>

                                <div class="row">

                                    <div class="col-md-6">
                                        <div class="form-check">
                                            <input class="form-check-input symptomCheck" type="checkbox" name="symptoms"
                                                value="Frequent Urination">
                                            <label class="form-check-label">Frequent Urination</label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input symptomCheck" type="checkbox" name="symptoms"
                                                value="Increased Thirst">
                                            <label class="form-check-label">Increased Thirst</label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input symptomCheck" type="checkbox" name="symptoms"
                                                value="Sudden Weight Loss">
                                            <label class="form-check-label">Sudden Weight Loss</label>
                                        </div>
                                    </div>

                                    <div class="col-md-6">
                                        <div class="form-check">
                                            <input class="form-check-input symptomCheck" type="checkbox" name="symptoms"
                                                value="Fatigue / Weakness">
                                            <label class="form-check-label">Fatigue / Weakness</label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input symptomCheck" type="checkbox" name="symptoms"
                                                value="Blurred Vision">
                                            <label class="form-check-label">Blurred Vision</label>
                                        </div>

                                        <div class="form-check">
                                            <input class="form-check-input symptomCheck" type="checkbox" name="symptoms"
                                                value="Slow Healing Wounds">
                                            <label class="form-check-label">Slow Healing Wounds</label>
                                        </div>
                                    </div>

                                </div>
                            </div>

                            <!-- Button -->
                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-custom text-white">
                                    Next ➝ Enter Medical Values
                                </button>
                            </div>

                            <!-- Back Button -->
                            <div class="text-center mt-3">
                                <a href="/" class="btn btn-outline-primary btn-sm">⬅ Back to Home</a>
                            </div>

                        </form>

                    </div>

                </div>

            </div>
        </div>
    </div>

    <!-- Patient JS -->
    <script src="{{ url_for('static', filename='patient.js') }}"></script>

</body>

</html>
